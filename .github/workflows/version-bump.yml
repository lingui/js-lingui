name: version-bump

on:
  workflow_dispatch:
    inputs:
      versionType:
        type: choice
        description: 'Version type to bump'
        options:
        - latest
        - next
        required: true
        default: "latest"

jobs:
  version-bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
          scope: '@lingui'

      - name: Install dependencies if needed
        run: yarn install

      - name: Build packages
        run: yarn release:build

      - name: Unit Testing
        run: yarn test:ci

      - name: Linting & Types
        run: yarn lint:all

      - name: Prepare Lingui-Bot git account
        uses: oleksiyrudenko/gha-git-credentials@8bb1fe6d543b2233ef1856cd3b0181f5abbd4d6a # v2.1.2
        with:
          name: 'Lingui Bot'
          email: 'linguibot@gmail.com'
          actor: 'lingui-bot'
          token: '${{ secrets.GH_TOKEN }}'

      - name: Versioning packages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn version:${{github.event.inputs.versionType}}
